<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Outlet Briefing · DispensaryIQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="assets/theme.js?v=20"></script>
  <script src="assets/header.js?v=29"></script>
  <link rel="stylesheet" href="assets/style.css?v=28" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #060A57;
      --teal:      #00B98E;
      --coral:     #DB5461;
      --blue:      #3273DB;
      --text:      #F7FBFE;
      --muted:     rgba(247,251,254,0.6);
      --card-bg:   rgba(255,255,255,0.06);
      --border:    rgba(255,255,255,0.1);
      --neutral-tag: rgba(255,255,255,0.15);
      --drop-bg:   #080D45;
      --font-main: 'Manrope', 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* PAGE LAYOUT */
    .outlet-page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px 64px;
    }

    /* PICKER */
    .picker-wrap {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px 24px;
      margin-bottom: 28px;
    }
    .picker-label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .picker-field { position: relative; }
    .picker-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font-main);
      font-size: 15px;
      padding: 11px 40px 11px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .picker-input:focus { border-color: var(--teal); }
    .picker-input::placeholder { color: var(--muted); }
    .picker-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: none;
      padding: 0 2px;
    }
    .picker-clear.visible { display: block; }
    .picker-clear:hover { color: var(--text); }

    /* Dropdown */
    .picker-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--drop-bg);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      max-height: 380px;
      overflow-y: auto;
      z-index: 400;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }
    .picker-dropdown[hidden] { display: none; }
    .picker-group-header {
      padding: 8px 14px 5px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      position: sticky;
      top: 0;
      background: var(--drop-bg);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .picker-option {
      padding: 9px 14px;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.1s;
    }
    .picker-option:last-child { border-bottom: none; }
    .picker-option:hover, .picker-option.focused { background: rgba(0,185,142,0.1); }
    .picker-option-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .picker-option-dot.has-data { background: var(--teal); }
    .picker-option-dot.no-data  { background: rgba(255,255,255,0.2); }
    .picker-option-name {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .picker-option-meta {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .picker-no-results {
      padding: 24px 14px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 64px 24px; }
    .empty-title { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 10px; line-height: 1.2; }
    .empty-body { color: var(--muted); font-size: 15px; max-width: 460px; margin: 0 auto 36px; line-height: 1.6; }
    .quick-picks { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .quick-pick {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s;
      min-width: 160px;
    }
    .quick-pick:hover { border-color: var(--teal); background: rgba(0,185,142,0.07); }
    .quick-pick-name { font-weight: 700; font-size: 13px; color: var(--text); margin-bottom: 3px; }
    .quick-pick-meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); }

    /* LOADING / ERROR */
    .loading-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 40vh; gap: 16px;
      color: var(--muted); font-family: var(--font-mono); font-size: 13px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(0,185,142,0.2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 40vh; gap: 12px; text-align: center;
    }
    .error-state h2 { font-size: 22px; font-weight: 700; color: var(--coral); }
    .error-state p  { color: var(--muted); font-size: 14px; }

    /* OUTLET HEADER */
    .outlet-header {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 24px;
    }
    .outlet-name { font-size: 30px; font-weight: 800; line-height: 1.15; margin-bottom: 6px; }
    .outlet-address { font-size: 14px; color: var(--muted); margin-bottom: 16px; }
    .badge-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .badge {
      display: inline-flex; align-items: center;
      padding: 4px 10px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .badge-mso       { background: var(--coral); color: #fff; }
    .badge-ind       { background: rgba(255,255,255,0.15); color: var(--text); }
    .badge-platform  { background: rgba(255,255,255,0.08); border: 1px solid var(--border); color: var(--muted); font-family: var(--font-mono); }
    .badge-certified { background: transparent; border: 1px solid var(--teal); color: var(--teal); }
    .outlet-summary  { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }

    /* SECTION LABEL */
    .section-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }

    /* VERDICT BAR */
    .verdict-bar { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
    .verdict-card {
      flex: 1 1 200px;
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px 20px 20px 24px;
      position: relative; overflow: hidden;
    }
    .verdict-card::before {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 4px;
      border-radius: 10px 0 0 10px;
    }
    .verdict-card.teal::before    { background: var(--teal); }
    .verdict-card.coral::before   { background: var(--coral); }
    .verdict-card.neutral::before { background: rgba(255,255,255,0.2); }
    .verdict-card.dimmed { opacity: 0.42; }
    .verdict-type {
      font-family: var(--font-mono); font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px;
    }
    .verdict-card.teal .verdict-type    { color: var(--teal); }
    .verdict-card.coral .verdict-type   { color: var(--coral); }
    .verdict-card.neutral .verdict-type { color: var(--muted); }
    .verdict-main { font-size: 22px; font-weight: 800; line-height: 1.2; margin-bottom: 4px; }
    .verdict-card.teal .verdict-main    { color: var(--teal); }
    .verdict-card.coral .verdict-main   { color: var(--coral); }
    .verdict-card.neutral .verdict-main { color: var(--text); }
    .verdict-sub { font-size: 13px; color: var(--muted); line-height: 1.4; }

    /* THREE MOVES */
    .moves-section { margin-bottom: 24px; }
    .moves-grid { display: flex; flex-direction: column; gap: 12px; }
    .move-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px 24px;
      display: flex; gap: 20px; align-items: flex-start;
    }
    .move-accent { width: 4px; min-width: 4px; border-radius: 2px; align-self: stretch; }
    .move-accent.defend { background: var(--teal); }
    .move-accent.fix    { background: var(--coral); }
    .move-accent.pitch  { background: var(--blue); }
    .move-body { flex: 1; }
    .move-tag {
      display: inline-block; font-family: var(--font-mono);
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 9px; border-radius: 4px; margin-bottom: 8px;
    }
    .move-tag.defend { background: rgba(0,185,142,0.18); color: var(--teal); }
    .move-tag.fix    { background: rgba(219,84,97,0.18); color: var(--coral); }
    .move-tag.pitch  { background: rgba(50,115,219,0.18); color: var(--blue); }
    .move-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
    .move-text  { font-size: 14px; color: var(--muted); line-height: 1.6; }

    /* CATEGORY TABLE */
    .table-section { margin-bottom: 24px; }
    .table-wrap {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden; overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: rgba(255,255,255,0.05);
      font-family: var(--font-mono); font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); padding: 12px 16px; text-align: left;
      white-space: nowrap; border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.04); }
    tbody tr.has-curaleaf { background: rgba(0,185,142,0.06); }
    tbody tr.has-curaleaf:hover { background: rgba(0,185,142,0.1); }
    tbody td { padding: 11px 16px; vertical-align: middle; color: var(--text); white-space: nowrap; }
    td.cat-name { font-weight: 600; white-space: normal; min-width: 140px; }
    td.mono { font-family: var(--font-mono); font-size: 12px; }
    td.muted-val { color: var(--muted); }
    .read-tag {
      display: inline-block; font-family: var(--font-mono);
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 3px 8px; border-radius: 4px; white-space: nowrap;
    }
    .read-you-lead    { background: rgba(0,185,142,0.2); color: var(--teal); }
    .read-overpriced  { background: rgba(219,84,97,0.2); color: var(--coral); }
    .read-white-space { background: rgba(219,84,97,0.2); color: var(--coral); }
    .read-2-push      { background: var(--neutral-tag); color: var(--text); }
    .read-holding     { background: var(--neutral-tag); color: var(--text); }
    .read-default     { background: rgba(255,255,255,0.08); color: var(--muted); }

    @media (max-width: 680px) {
      .outlet-header { padding: 20px; }
      .outlet-name { font-size: 22px; }
      .verdict-card { flex: 1 1 100%; }
      .outlet-page { padding: 20px 16px 48px; }
    }
  </style>
</head>
<body>

<nav class="diq-nav">
  <div class="diq-nav-inner">
    <a href="index.html" class="diq-logo">Dispensary<span class="accent">IQ</span></a>
    <div class="diq-nav-controls" id="diq-nav-controls"></div>
    <div class="diq-nav-aside">
      <button class="diq-theme-toggle" onclick="diqToggleTheme()" title="Toggle light / dark theme" aria-label="Toggle theme">
        <svg class="diq-theme-icon-moon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M13 9.5A5.5 5.5 0 0 1 6.5 3a5.5 5.5 0 1 0 6.5 6.5z"/></svg>
        <svg class="diq-theme-icon-sun"  viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.4 1.4M11.55 11.55l1.4 1.4M3.05 12.95l1.4-1.4M11.55 4.45l1.4-1.4"/></svg>
      </button>
    </div>
  </div>
</nav>

<main class="diq-main">
  <div class="outlet-page">

    <!-- PICKER (always visible) -->
    <div class="picker-wrap">
      <div class="picker-label">Select outlet</div>
      <div class="picker-field" id="picker-field">
        <input type="text" id="picker-input" class="picker-input"
               placeholder="Search by name, city, or address…"
               autocomplete="off" spellcheck="false"
               aria-label="Search outlets" role="combobox"
               aria-autocomplete="list" aria-expanded="false" />
        <button class="picker-clear" id="picker-clear" aria-label="Clear selection">×</button>
        <div class="picker-dropdown" id="picker-dropdown" hidden role="listbox"></div>
      </div>
    </div>

    <!-- CONTENT: empty state or briefing -->
    <div id="outlet-content">
      <div class="empty-state" id="empty-state">
        <div class="empty-title">Pick an outlet to see the rep briefing</div>
        <div class="empty-body">Where you win, where you're overpriced, and what isn't carried — one store at a time.</div>
        <div class="quick-picks" id="quick-picks"></div>
      </div>
      <div id="briefing-wrap" hidden></div>
    </div>

  </div>
</main>

<script>
(function () {
  'use strict';

  var API_BASE = 'https://dip-service-production-0db3.up.railway.app';

  var _index    = [];
  var _activeId = null;
  var _focusIdx = -1;

  var inputEl    = document.getElementById('picker-input');
  var clearBtn   = document.getElementById('picker-clear');
  var dropEl     = document.getElementById('picker-dropdown');
  var emptyEl    = document.getElementById('empty-state');
  var briefingEl = document.getElementById('briefing-wrap');
  var quickEl    = document.getElementById('quick-picks');

  /* helpers */
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmt(n)      { return n == null ? '—' : Number(n).toLocaleString(); }
  function fmtPrice(p) { return p == null ? '—' : '$' + Number(p).toFixed(2); }
  function fmtPos(p)   { return p == null ? '—' : '#' + Math.round(p); }
  function fmtAddress(o) {
    var stateZip = [o.state, o.postcode].filter(Boolean).join(' ');
    if (o.address && o.city) return [o.address, o.city, stateZip].filter(Boolean).join(', ');
    if (o.city) return [o.city, stateZip].filter(Boolean).join(', ');
    return 'Address unavailable';
  }
  function readTagClass(tag) {
    if (!tag) return 'read-default';
    var t = tag.toLowerCase().replace(/[\s_]+/g, '-');
    if (t.includes('you-lead'))   return 'read-you-lead';
    if (t.includes('overpriced')) return 'read-overpriced';
    if (t.includes('white-space'))return 'read-white-space';
    if (t.includes('2-push') || t.includes('#2')) return 'read-2-push';
    if (t.includes('holding'))    return 'read-holding';
    return 'read-default';
  }

  /* index fetch */
  function fetchIndex() {
    return fetch(API_BASE + '/pitch/api/outlet-index')
      .then(function (r) { return r.ok ? r.json() : Promise.reject(r.status); })
      .then(function (data) { _index = data.outlets || []; buildQuickPicks(); })
      .catch(function (e) { console.warn('outlet-index fetch failed', e); });
  }

  /* quick picks */
  var FEATURED = [{ id: 37375735, name: 'Premo Cannabis', meta: 'Keyport, NJ · Featured' }];

  function buildQuickPicks() {
    var chips = FEATURED.slice();
    var byState = {};
    _index.forEach(function (o) {
      if (o.categories > 0 && !byState[o.state] && o.state !== 'NJ') byState[o.state] = o;
    });
    Object.keys(byState).sort().forEach(function (st) {
      var o = byState[st];
      chips.push({ id: o.id, name: o.name, meta: o.city + ', ' + o.state + ' · ' + o.categories + ' cats' });
    });
    chips = chips.slice(0, 5);
    var html = '';
    chips.forEach(function (c) {
      html += '<button class="quick-pick" data-id="' + c.id + '">' +
        '<div class="quick-pick-name">' + esc(c.name) + '</div>' +
        '<div class="quick-pick-meta">' + esc(c.meta) + '</div>' +
        '</button>';
    });
    quickEl.innerHTML = html;
    quickEl.querySelectorAll('.quick-pick').forEach(function (btn) {
      btn.addEventListener('click', function () { selectOutlet(parseInt(btn.getAttribute('data-id'), 10)); });
    });
  }

  /* picker */
  function filterIndex(q) {
    if (!q) return _index;
    var lq = q.toLowerCase();
    return _index.filter(function (o) {
      return (o.name    || '').toLowerCase().includes(lq) ||
             (o.city    || '').toLowerCase().includes(lq) ||
             (o.address || '').toLowerCase().includes(lq) ||
             (o.state   || '').toLowerCase() === lq;
    });
  }

  function renderDropdown(results) {
    if (!results.length) {
      dropEl.innerHTML = '<div class="picker-no-results">No outlets match "' + esc(inputEl.value) + '"</div>';
      dropEl.hidden = false;
      inputEl.setAttribute('aria-expanded', 'true');
      _focusIdx = -1;
      return;
    }
    var groups = {}, stateOrder = [];
    results.forEach(function (o) {
      if (!groups[o.state]) { groups[o.state] = []; stateOrder.push(o.state); }
      groups[o.state].push(o);
    });
    var html = '';
    stateOrder.forEach(function (st) {
      html += '<div class="picker-group-header">' + esc(st) + '</div>';
      groups[st].forEach(function (o) {
        var dot  = o.categories > 0 ? 'has-data' : 'no-data';
        var meta = o.categories > 0 ? o.categories + ' cat' + (o.categories !== 1 ? 's' : '') : 'no data';
        html += '<div class="picker-option" data-id="' + o.id + '" role="option">' +
          '<span class="picker-option-dot ' + dot + '"></span>' +
          '<span class="picker-option-name">' + esc(o.name) + '</span>' +
          '<span class="picker-option-meta">' + esc(o.city) + ' · ' + esc(meta) + '</span>' +
          '</div>';
      });
    });
    dropEl.innerHTML = html;
    dropEl.hidden = false;
    inputEl.setAttribute('aria-expanded', 'true');
    _focusIdx = -1;
    dropEl.querySelectorAll('.picker-option').forEach(function (el) {
      el.addEventListener('mousedown', function (e) {
        e.preventDefault();
        selectOutlet(parseInt(el.getAttribute('data-id'), 10));
      });
    });
  }

  function closeDropdown() {
    dropEl.hidden = true;
    dropEl.innerHTML = '';
    inputEl.setAttribute('aria-expanded', 'false');
    _focusIdx = -1;
  }

  function moveFocus(dir) {
    var opts = Array.from(dropEl.querySelectorAll('.picker-option'));
    if (!opts.length) return;
    opts.forEach(function (o) { o.classList.remove('focused'); });
    _focusIdx = Math.max(0, Math.min(opts.length - 1, _focusIdx + dir));
    opts[_focusIdx].classList.add('focused');
    opts[_focusIdx].scrollIntoView({ block: 'nearest' });
  }

  inputEl.addEventListener('input', function () {
    var q = inputEl.value.trim();
    clearBtn.classList.toggle('visible', q.length > 0 || _activeId != null);
    renderDropdown(filterIndex(q));
  });

  inputEl.addEventListener('focus', function () {
    renderDropdown(filterIndex(inputEl.value.trim()));
  });

  inputEl.addEventListener('keydown', function (e) {
    if (dropEl.hidden) return;
    if (e.key === 'ArrowDown')  { e.preventDefault(); moveFocus(1); }
    else if (e.key === 'ArrowUp')   { e.preventDefault(); moveFocus(-1); }
    else if (e.key === 'Enter') {
      e.preventDefault();
      var f = dropEl.querySelector('.picker-option.focused');
      if (f) selectOutlet(parseInt(f.getAttribute('data-id'), 10));
    }
    else if (e.key === 'Escape') { closeDropdown(); inputEl.blur(); }
  });

  document.addEventListener('click', function (e) {
    if (!e.target.closest('#picker-field')) closeDropdown();
  });

  clearBtn.addEventListener('click', function () {
    _activeId = null;
    inputEl.value = '';
    clearBtn.classList.remove('visible');
    closeDropdown();
    showEmpty();
    history.replaceState(null, '', '/outlet');
    document.title = 'Outlet Briefing · DispensaryIQ';
  });

  /* select outlet */
  function selectOutlet(id) {
    var outlet = _index.find(function (o) { return o.id === id; });
    inputEl.value = outlet ? outlet.name : ('Outlet ' + id);
    clearBtn.classList.add('visible');
    closeDropdown();
    inputEl.blur();
    if (id === _activeId) return;
    _activeId = id;
    history.pushState({ id: id }, '', '/outlet/' + id);
    loadBriefing(id);
  }

  /* briefing states */
  function showEmpty() {
    emptyEl.hidden = false;
    briefingEl.hidden = true;
    briefingEl.innerHTML = '';
  }
  function showLoading() {
    emptyEl.hidden = true;
    briefingEl.hidden = false;
    briefingEl.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Loading briefing…</span></div>';
  }
  function showError(status, message) {
    emptyEl.hidden = true;
    briefingEl.hidden = false;
    briefingEl.innerHTML = '<div class="error-state">' +
      '<h2>' + (status === 404 ? 'Outlet not found' : 'Error loading briefing') + '</h2>' +
      '<p>' + esc(status === 404 ? 'No briefing data for this dispensary ID.' : (message || 'Unexpected error.')) + '</p>' +
      '</div>';
  }

  function loadBriefing(id) {
    showLoading();
    fetch(API_BASE + '/pitch/api/outlet/' + id)
      .then(function (r) {
        if (!r.ok) return r.text().then(function (t) { throw { status: r.status, message: t }; });
        return r.json();
      })
      .then(function (data) { if (_activeId === id) renderBriefing(data); })
      .catch(function (err) { if (_activeId === id) showError(err.status, err.message); });
  }

  /* render briefing */
  function renderBriefing(data) {
    var outlet     = data.outlet     || {};
    var verdict    = data.verdict    || {};
    var moves      = data.moves      || [];
    var categories = data.categories || [];
    var summary    = data.summary    || {};

    document.title = 'DispensaryIQ — ' + (outlet.name || 'Rep Briefing');

    var nCats  = summary.category_count != null ? summary.category_count : categories.length;
    var nProds = summary.total_products != null ? summary.total_products : '—';

    /* header */
    var mso = outlet.mso_banner || outlet.mso_parent;
    var ownerBadge = mso
      ? '<span class="badge badge-mso">MSO · ' + esc(mso) + '</span>'
      : '<span class="badge badge-ind">Independent</span>';
    var platBadge = outlet.platform
      ? '<span class="badge badge-platform">' + esc(outlet.platform) + '</span>'
      : '';

    var headerHTML =
      '<div class="outlet-header">' +
        '<div class="outlet-name">' + esc(outlet.name || 'Unknown') + '</div>' +
        '<div class="outlet-address">' + esc(fmtAddress(outlet)) + '</div>' +
        '<div class="badge-row">' + ownerBadge + platBadge +
          '<span class="badge badge-certified">SHELF READ · CERTIFIED</span></div>' +
        '<div class="outlet-summary">' + esc(nCats) + ' categories · ' + fmt(nProds) + ' products on menu</div>' +
      '</div>';

    /* verdict */
    function verdictCard(cls, typeLabel, mainVal, subText, dimmed) {
      return '<div class="verdict-card ' + cls + (dimmed ? ' dimmed' : '') + '">' +
        '<div class="verdict-type">' + esc(typeLabel) + '</div>' +
        '<div class="verdict-main">' + mainVal + '</div>' +
        '<div class="verdict-sub">' + subText + '</div>' +
        '</div>';
    }
    var win = verdict.win_category || {};
    var ovp = verdict.overpriced   || {};
    var sho = verdict.shelf_owner  || {};
    var wsCount = verdict.white_space_count || 0;

    var winCard = win.category
      ? verdictCard('teal', 'YOU WIN HERE', esc(win.brand || 'Curaleaf'), esc(win.category), false)
      : verdictCard('teal', 'YOU WIN HERE', '—', 'No win identified', true);
    var ovpCard = ovp.brand
      ? verdictCard('coral', 'OVERPRICED', esc(ovp.brand),
          esc(ovp.category || '') + ' · <span style="color:var(--coral);font-family:var(--font-mono)">' + fmtPrice(ovp.price) + '</span>', false)
      : verdictCard('coral', 'OVERPRICED', '—', 'No pricing issue', true);
    var ncCard = wsCount > 0
      ? verdictCard('coral', 'NOT CARRIED', fmt(wsCount), 'categor' + (wsCount === 1 ? 'y' : 'ies') + ' with zero Curaleaf', false)
      : verdictCard('coral', 'NOT CARRIED', '—', 'No white space', true);
    var shoCard = sho.brand
      ? verdictCard('neutral', 'SHELF OWNER', esc(sho.brand), 'leads ' + fmt(sho.category_count) + ' categories', false)
      : verdictCard('neutral', 'SHELF OWNER', '—', 'No dominant competitor', true);

    var verdictHTML = '<div class="section-label">VERDICT</div>' +
      '<div class="verdict-bar">' + winCard + ovpCard + ncCard + shoCard + '</div>';

    /* three moves */
    var moveOrder = ['defend','fix','pitch'];
    var moveMap = {};
    moves.forEach(function (m) { moveMap[(m.type||'').toLowerCase()] = m; });
    var movesInner = '';
    moveOrder.forEach(function (type) {
      var m = moveMap[type];
      if (!m) return;
      movesInner += '<div class="move-card">' +
        '<div class="move-accent ' + type + '"></div>' +
        '<div class="move-body">' +
          '<span class="move-tag ' + type + '">' + type.toUpperCase() + '</span>' +
          '<div class="move-title">' + esc(m.title || '') + '</div>' +
          '<div class="move-text">' + esc(m.body || '') + '</div>' +
        '</div></div>';
    });
    var movesHTML = movesInner
      ? '<div class="moves-section"><div class="section-label">THREE MOVES</div><div class="moves-grid">' + movesInner + '</div></div>'
      : '';

    /* category table */
    var tableRows = '';
    categories.forEach(function (cat) {
      var hasCuraleaf = cat.has_curaleaf || cat.curaleaf_brand != null;
      var tag = cat.read_tag || '';
      tableRows += '<tr class="' + (hasCuraleaf ? 'has-curaleaf' : '') + '">' +
        '<td class="cat-name">' + esc(cat.category || '—') + '</td>' +
        '<td>' + esc(cat.shelf_leader || '—') + '</td>' +
        '<td>' + esc(cat.curaleaf_brand || (hasCuraleaf ? 'Yes' : '—')) + '</td>' +
        '<td class="mono">' + fmt(cat.curaleaf_skus != null ? cat.curaleaf_skus : cat.total_skus) + '</td>' +
        '<td class="mono">' + fmtPrice(cat.wt_price) + '</td>' +
        '<td class="mono muted-val">' + fmtPos(cat.avg_pos) + '</td>' +
        '<td><span class="read-tag ' + readTagClass(tag) + '">' + esc(tag || '—') + '</span></td>' +
        '</tr>';
    });

    var tableHTML = '<div class="table-section"><div class="section-label">BY CATEGORY</div>' +
      '<div class="table-wrap"><table>' +
        '<thead><tr><th>Category</th><th>Shelf Leader</th><th>Curaleaf Brand</th>' +
        '<th>SKUs</th><th>Price</th><th>Position</th><th>Read</th></tr></thead>' +
        '<tbody>' + (tableRows || '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:24px">No category data</td></tr>') + '</tbody>' +
      '</table></div></div>';

    emptyEl.hidden = true;
    briefingEl.hidden = false;
    briefingEl.innerHTML = headerHTML + verdictHTML + movesHTML + tableHTML;
  }

  /* history API */
  window.addEventListener('popstate', function (e) {
    if (e.state && e.state.id) {
      _activeId = e.state.id;
      var o = _index.find(function (x) { return x.id === e.state.id; });
      inputEl.value = o ? o.name : ('Outlet ' + e.state.id);
      clearBtn.classList.add('visible');
      loadBriefing(e.state.id);
    } else {
      _activeId = null;
      inputEl.value = '';
      clearBtn.classList.remove('visible');
      showEmpty();
      document.title = 'Outlet Briefing · DispensaryIQ';
    }
  });

  /* bootstrap */
  (function init() {
    var pathMatch = window.location.pathname.match(/\/outlet\/(\d+)/);
    var queryId   = new URLSearchParams(window.location.search).get('id');
    var initialId = pathMatch ? parseInt(pathMatch[1], 10) : (queryId ? parseInt(queryId, 10) : null);

    if (initialId) {
      _activeId = initialId;
      inputEl.value = 'Loading…';
      clearBtn.classList.add('visible');
      history.replaceState({ id: initialId }, '', '/outlet/' + initialId);
      loadBriefing(initialId);
    } else {
      showEmpty();
    }

    fetchIndex().then(function () {
      if (_activeId) {
        var o = _index.find(function (x) { return x.id === _activeId; });
        if (o) inputEl.value = o.name;
      }
    });
  })();
})();
</script>
</body>
</html>
